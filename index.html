<style>
  :root{
    --bg: #0a0e14;
    --bg-panel: #10141b;
    --bg-elevated: #161b22;
    --bg-hover: #1c2230;
    --border: #232a37;
    --border-soft: #1a2029;
    --text: #e6e6ea;
    --text-muted: #8b93a1;
    --text-dim: #545c6b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;

    --c-doc: #58a6ff;
    --c-sheet: #3fb950;
    --c-dir: #d29922;
    --c-mp4: #f778ba;
    --c-fig: #bc8cff;
    --c-git: #9aa4b2;
    --c-log: #ffa657;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .app{
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  .titlebar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
    padding: 12px 16px;
  }
  .dots{ display:flex; gap:6px; }
  .dot{ width:9px; height:9px; border-radius:50%; opacity:.55; }
  .dot.r{ background:#ff5f56; }
  .dot.y{ background:#ffbd2e; }
  .dot.g{ background:#27c93f; }
  .titlebar .path{
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--text-dim);
  }
  .titlebar .path b{ color: var(--text-muted); font-weight: 500; }

  header.hero{
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-top: none;
    padding: 40px 32px 32px;
  }
  .eyebrow{
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: .18em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  h1{
    font-family: var(--mono);
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.01em;
    display:flex; align-items:baseline; gap:10px;
  }
  .cursor{
    display:inline-block; width:11px; height:26px; background: var(--c-sheet);
    animation: blink 1.1s steps(1) infinite;
    transform: translateY(2px);
  }
  @keyframes blink{ 50%{ opacity:0; } }
  .hero p.tagline{
    margin-top: 14px;
    color: var(--text-muted);
    font-size: 15px;
    max-width: 560px;
  }

  .tabs{
    display:flex;
    overflow-x:auto;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-top: none;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    padding: 13px 18px;
    display:flex; align-items:center; gap:8px;
    cursor:pointer;
    white-space:nowrap;
    border-right: 1px solid var(--border-soft);
    border-bottom: 2px solid transparent;
    transition: all .15s ease;
    background: transparent;
  }
  .tab .tdot{ width:7px; height:7px; border-radius:50%; opacity:.5; transition: opacity .15s ease; }
  .tab:hover{ color: var(--text-muted); background: var(--bg-hover); }
  .tab.active{
    color: var(--text);
    background: var(--bg);
  }
  .tab.active .tdot{ opacity:1; }

  .panel{
    display:none;
    background: var(--bg);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    padding: 36px 32px 40px;
  }
  .panel.active{ display:block; animation: fadein .25s ease; }
  @keyframes fadein{ from{ opacity:0; transform: translateY(4px);} to{ opacity:1; transform:none; } }

  .p-title{ font-family: var(--mono); font-size: 26px; font-weight:700; margin-bottom:6px; }
  .p-summary{ color: var(--text-muted); font-size:14.5px; max-width: 620px; margin-bottom: 18px; }

  .role-badge{
    display: inline-flex; align-items:center; gap:7px;
    font-family: var(--mono); font-size:11.5px;
    padding: 5px 11px; border-radius: 5px;
    background: var(--bg-elevated); border:1px solid var(--border);
    color: var(--text-muted); margin-bottom: 22px;
  }
  .role-badge b{ color: var(--text); font-weight:600; }

  .note{
    font-size: 13px; color: var(--text-dim); font-style: italic;
    margin: -8px 0 22px; padding-left: 14px; border-left: 2px solid var(--border);
  }

  .media-wrap{
    margin-bottom: 24px;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg-panel);
    display: none;
  }
  .media-wrap.ready{ display:block; }
  .media-stage{
    position: relative;
    aspect-ratio: 16/9;
    background: #000;
    display:flex; align-items:center; justify-content:center;
  }
  .media-slide{ display:none; width:100%; height:100%; align-items:center; justify-content:center; }
  .media-slide.active{ display:flex; }
  .media-slide img, .media-slide video{ width:100%; height:100%; object-fit:contain; background:#000; }
  .media-nav{
    position:absolute; top:50%; transform:translateY(-50%);
    background: rgba(0,0,0,.5); color:#fff; border:none;
    width:32px; height:32px; border-radius:50%; cursor:pointer;
    font-size:15px; display:flex; align-items:center; justify-content:center;
    transition: background .15s ease;
  }
  .media-nav:hover{ background: rgba(0,0,0,.75); }
  .media-nav.prev{ left:10px; } .media-nav.next{ right:10px; }
  .media-foot{ display:flex; align-items:center; justify-content:center; gap:8px; padding:10px; background: var(--bg-panel); }
  .media-dot{ width:6px; height:6px; border-radius:50%; background: var(--border); cursor:pointer; transition: background .15s ease, transform .15s ease; border:none; padding:0; }

  .pptx-wrap{
    margin-bottom: 24px;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg-panel);
    display: none;
  }
  .pptx-wrap.ready{ display:block; }

    height: 620px;
    border: none;
    display: block;

  .pptx-foot{

  .pptx-foot a{ color: var(--text-muted); text-decoration:none; }
  .pptx-foot a:hover{ color: var(--text); }

  .code-block{
    font-family: var(--mono);
    font-size: 12.8px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;

    margin-bottom: 22px;
    overflow-x:auto;

  .kw{ color:#ff7b72; }
  .brace{ color: var(--text-dim); }
  .mod{ color: #a5d6ff; }

  .section-label{
    font-family: var(--mono); font-size:11px; letter-spacing:.12em;
    text-transform:uppercase; color: var(--text-dim); margin: 26px 0 10px;

  ul.highlights{ list-style:none; }
  ul.highlights li{

    padding: 7px 0 7px 18px; position:relative;
    border-bottom: 1px solid var(--border-soft);
  }
  ul.highlights li::before{
    content:'▸'; position:absolute; left:0; color: var(--accent, var(--c-sheet));

  }
  ul.highlights li b{ color: var(--text); font-weight:600; }

  .filelist{ border: 1px solid var(--border); border-radius: 8px; overflow:hidden; }
  a.filerow{
    display:flex; align-items:center; gap:12px;
    padding: 11px 14px;
    text-decoration:none; color: var(--text);

  a.filerow:hover{ background: var(--bg-hover); padding-left: 19px; }
  a.filerow.child{ padding-left: 34px; background: var(--bg); }

  .tree-prefix{ font-family: var(--mono); color: var(--text-dim); font-size: 12px; }
  .badge{

  .arrow{ color: var(--text-dim); font-size:13px; transition: transform .12s ease; }

    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--text-dim);

    header.hero{ padding: 28px 20px 24px; }
    h1{ font-size: 26px; }
    .panel{ padding: 26px 18px 30px; }
    .code-block{ font-size: 11.5px; }
  }

  :focus-visible{ outline: 2px solid var(--text-muted); outline-offset: 2px; }
</style>
</head>

const badgeColorVar = { DOC:'--c-doc', SHEET:'--c-sheet', DIR:'--c-dir', MP4:'--c-mp4', FIG:'--c-fig', GIT:'--c-git', LOG:'--c-log' };
const IMAGE_EXTS = ['jpg', 'jpeg', 'png', 'webp'];
const VIDEO_EXTS = ['mp4', 'webm', 'mov'];
const MAX_IMAGES = 8;
const MAX_VIDEOS = 3;

function renderStackBlock(stack){
  return stack.map(group => {
    return `<div class="code-line"><span class="kw">import</span> <span class="brace">{</span> ${group.items.join(', ')} <span class="brace">}</span> <span class="kw">from</span> <span class="mod">'${group.comment}'</span></div>`;
  }).join('');
}

function renderFileRow(f, isChild){
  const colorVar = badgeColorVar[f.type] || '--c-doc';
  const cls = 'filerow' + (isChild ? ' child' : '');
  const prefix = isChild ? '<span class="tree-prefix">ㄴ</span>' : '';
  return `<a class="${cls}" href="${f.url}" target="_blank" rel="noopener noreferrer">
    ${prefix}
    <span class="badge" style="color:var(${colorVar}); background:color-mix(in srgb, var(${colorVar}) 16%, transparent); border:1px solid color-mix(in srgb, var(${colorVar}) 35%, transparent);">${f.type}</span>
    <span class="fname">${f.name}</span>
    <span class="arrow">↗</span>
  </a>`;
}

function renderFileSection(p){
  if (p.filesTree) {
    const t = p.filesTree;
    const parentRow = renderFileRow(t.parent, false);
    const childRows = t.children.map(f => renderFileRow(f, true)).join('');
    const otherRows = t.others.map(f => renderFileRow(f, false)).join('');
    return `<div class="filelist">${parentRow}${childRows}${otherRows}</div>`;
  }
  return `<div class="filelist">${p.files.map(f => renderFileRow(f, false)).join('')}</div>`;
}

const tabsEl = document.getElementById('tabs');
const panelsEl = document.getElementById('panels');

projects.forEach((p, idx) => {

function activate(id){
  document.querySelectorAll('.tab').forEach(t => {
    const active = t.dataset.id === id;
    t.classList.toggle('active', active);
    const p = projects.find(x => x.id === t.dataset.id);
    t.style.borderBottomColor = active ? p.accent : 'transparent';
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.dataset.id === id));
}

/* ---------------- media detection + carousel ---------------- */

async function urlExists(url){
  try {
    const res = await fetch(url, { method: 'HEAD', cache: 'no-store' });
    return res.ok;
  } catch(e){
    return false;
  }
}

async function findMediaForSlug(slug){
  const videos = [];
  const images = [];

  for (let i = 1; i <= MAX_VIDEOS; i++){
    let found = null;
    for (const ext of VIDEO_EXTS){
      const url = `./${slug}_video_${i}.${ext}`;
      if (await urlExists(url)){ found = url; break; }
    }
    if (found) videos.push(found); else break;
  }

  for (let i = 1; i <= MAX_IMAGES; i++){
    let found = null;
    for (const ext of IMAGE_EXTS){
      const url = `./${slug}_image_${i}.${ext}`;
      if (await urlExists(url)){ found = url; break; }
    }
    if (found) images.push(found); else break;
  }

  return { videos, images };
}

function buildCarousel(container, videos, images){
  const slides = [
    ...videos.map(url => ({ type: 'video', url })),
    ...images.map(url => ({ type: 'image', url })),
  ];
  if (slides.length === 0) return;

  container.classList.add('ready');
  container.innerHTML = `
    <div class="media-stage">
      ${slides.map((s, i) => `
        <div class="media-slide${i === 0 ? ' active' : ''}" data-i="${i}">
          ${s.type === 'video'
            ? `<video src="${s.url}" controls playsinline></video>`
            : `<img src="${s.url}" alt="demo ${i+1}">`}
        </div>
      `).join('')}
      ${slides.length > 1 ? `
        <button class="media-nav prev" aria-label="이전">‹</button>
        <button class="media-nav next" aria-label="다음">›</button>
      ` : ''}
    </div>
    ${slides.length > 1 ? `
      <div class="media-foot">
        ${slides.map((_, i) => `<button class="media-dot${i === 0 ? ' active' : ''}" data-i="${i}"></button>`).join('')}
      </div>
    ` : ''}
  `;

  let current = 0;
  let timer = null;
  const slideEls = container.querySelectorAll('.media-slide');
  const dotEls = container.querySelectorAll('.media-dot');

  function stopVideos(){
    container.querySelectorAll('video').forEach(v => v.pause());
  }

  function show(i){
    current = (i + slides.length) % slides.length;
    stopVideos();
    slideEls.forEach((el, idx) => el.classList.toggle('active', idx === current));
    dotEls.forEach((el, idx) => el.classList.toggle('active', idx === current));
    resetTimer();
  }

  function resetTimer(){
    if (timer) clearInterval(timer);
    if (slides[current].type === 'image' && slides.length > 1){
      timer = setInterval(() => show(current + 1), 5000);
    }
  }

  if (slides.length > 1){
    container.querySelector('.prev').addEventListener('click', () => show(current - 1));
    container.querySelector('.next').addEventListener('click', () => show(current + 1));
    dotEls.forEach(el => el.addEventListener('click', () => show(parseInt(el.dataset.i, 10))));
  }

  resetTimer();
}

async function findPptxForSlug(slug){
  const url = `./${slug}.pptx`;
  return (await urlExists(url)) ? url : null;
}

function buildPptxEmbed(container, pptxUrl){
  const absoluteUrl = new URL(pptxUrl, window.location.href).href;
  const viewerUrl = `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(absoluteUrl)}`;
  container.classList.add('ready');
  container.innerHTML = `
    <iframe src="${viewerUrl}" allowfullscreen></iframe>
    <div class="pptx-foot">
      <span>slides preview — office viewer</span>
      <a href="${pptxUrl}" target="_blank" rel="noopener noreferrer">원본 PPT 새 창에서 열기 ↗</a>
    </div>
  `;
}

(async function initMedia(){
  await Promise.all(projects.map(async p => {
    const [{ videos, images }, pptxUrl] = await Promise.all([
      findMediaForSlug(p.slug),
      findPptxForSlug(p.slug),
    ]);

    if (videos.length > 0 || images.length > 0){
      const mediaContainer = document.getElementById(`media-${p.id}`);
      buildCarousel(mediaContainer, videos, images);
    }

    if (pptxUrl){
      const pptxContainer = document.getElementById(`pptx-${p.id}`);
      buildPptxEmbed(pptxContainer, pptxUrl);
    }
  }));
})();
